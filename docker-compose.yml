###############################################################################
# lemonade-tq — Docker Compose configuration
#
# All persistent data is stored in ./data/ (self-contained, no named volumes).
# Uses TurboQuant-enabled llama-server baked into the image.
###############################################################################

networks:
    backend:
        driver: bridge

services:
    lemonade-tq:
        image: ${LEMONADE_IMAGE:-ghcr.io/mkadrlik/lemonade-tq:latest}
        restart: unless-stopped
        ipc: shareable
        container_name: lemonade-tq-server

        # ─── ROCm (AMD) GPU access ───────────────────────────────────
        devices:
            - /dev/kfd
            - /dev/dri
            - /dev/mem
        # _____________________________________________________________

        security_opt:
            - seccomp=unconfined
        networks:
            - backend
        ports:
            - "${LEMONADE_PORT:-13305}:13305"

        volumes:
            # All persistent data in ./data/ (self-contained)
            - ./data/cache:/root/.cache/huggingface
            - ./data/recipe:/root/.cache/lemonade

            # Configuration
            - ./config/config.json:/root/.cache/lemonade/config.json:rw
            - ./config/recipe_options.json:/root/.cache/lemonade/recipe_options.json:rw
            - ./config:/root/.config/lemonade:rw

            # ROCm runtime from host
            - /opt/${LEMONADE_LLAMACPP_BACKEND:-rocm}:/opt/${LEMONADE_LLAMACPP_BACKEND:-rocm}:ro

        environment:
            LEMONADE_LLAMACPP_BACKEND: ${LEMONADE_LLAMACPP_BACKEND:-rocm}
            LEMONADE_HOST: ${LEMONADE_HOST:-0.0.0.0}
            LEMONADE_PORT: ${LEMONADE_PORT:-13305}
            HSA_OVERRIDE_GFX_VERSION: ${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
            HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES:-0,1,2}
            LEMONADE_LLAMACPP_ARGS: ${LEMONADE_LLAMACPP_ARGS:---fit off --sm layer -ngl 99 -ctk turbo3 -ctv turbo3 --tensor-split 1,1,1}
            AUTO_LOAD_MODELS: ${AUTO_LOAD_MODELS:-}
            LD_LIBRARY_PATH: /opt/lemonade/llama/vulkan:/opt/lemonade/llama/rocm:/opt/rocm/lib

        group_add:
            - video
            - 993

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:13305/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
                tag: "lemonade-tq"
