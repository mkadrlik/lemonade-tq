name: Build & Deploy
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, rocm]
    steps:
      - name: Cleanup previous run
        run: |
          rm -rf /tmp/lemonade-tq

      - name: Checkout code
        run: |
          git clone --depth 1 http://192.168.50.11:3042/mkadrlik/lemonade-tq.git /tmp/lemonade-tq
          cd /tmp/lemonade-tq
          git checkout ${{ github.ref_name }}

      - name: Build Docker image
        run: |
          cd /tmp/lemonade-tq
          docker build -t 192.168.50.11:5001/lemonade-tq:${{ github.event.inputs.tag || github.ref_name }} .

      - name: Push to local registry
        run: |
          docker push 192.168.50.11:5001/lemonade-tq:${{ github.event.inputs.tag || github.ref_name }}

      - name: Install SSH
        run: |
          apk update && apk add --no-cache openssh

      - name: Deploy to NAS
        run: |
          ssh -o StrictHostKeyChecking=no mkadrlik@192.168.50.11 << 'SSH_EOF'
            cd /home/mkadrlik/docker/lemonade-tq
            docker compose down
            sed -i "s|image: .*|image: 192.168.50.11:5001/lemonade-tq:${TAG}|g" docker-compose.yml
            docker compose up -d
            sleep 30
            if docker inspect --format='{{.State.Health.Status}}' lemonade-tq-server | grep -q healthy; then
              echo "✅ Deployment successful"
            else
              if [ "${FORCE}" = "true" ]; then
                echo "⚠️ Health check failed but force_deploy=true, keeping deployment"
              else
                echo "❌ Health check failed - rolling back"
                docker compose down
                git checkout docker-compose.yml
                docker compose up -d
                exit 1
              fi
            fi
          SSH_EOF
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          FORCE: ${{ github.event.inputs.force_deploy }}