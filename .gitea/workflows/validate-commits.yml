name: Validate Conventional Commits
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Conventional Commits spec: https://www.conventionalcommits.org/en/v1.0.0/
# Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
# Format: <type>[optional scope]: <description>
# Breaking changes: feat! or BREAKING CHANGE in body/footer
# Note: Only validates NEW commits on each push, not entire history

jobs:
  validate:
    name: Validate Commits
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          # Conventional Commits regex pattern
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .+$'

          # Only check commits in this push (since last workflow run)
          # For push events, check HEAD~N..HEAD where N is the number of commits pushed
          if [ "${{ github.event_name }}" = "push" ]; then
            # Get the before SHA from the event
            BEFORE="${{ github.event.before }}"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              RANGE="$BEFORE..HEAD"
            else
              # First push, check all commits
              RANGE="HEAD~50..HEAD"
            fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="HEAD~50..HEAD"
          fi

          FAILED=0
          for COMMIT in $(git log --format="%H %s" $RANGE); do
            SHA=$(echo "$COMMIT" | cut -d' ' -f1)
            MSG=$(echo "$COMMIT" | cut -d' ' -f2-)

            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "INVALID: $SHA - $MSG"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "::error::Commit messages must follow Conventional Commits spec"
            echo "::error::Format: type(scope)!: description"
            echo "::error::Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

          echo "All commits follow Conventional Commits spec"
