name: Validate Conventional Commits
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Conventional Commits spec: https://www.conventionalcommits.org/en/v1.0.0/
# Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, merge
# Format: <type>[optional scope]: <description>
# Breaking changes: feat! or BREAKING CHANGE in body/footer
# Note: Only validates the current commit on each push

jobs:
  validate:
    name: Validate Commits
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate commit messages
        run: |
          # Conventional Commits regex pattern
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|merge)(\(.+\))?(!)?: .+$'

          # Check only the current commit
          MSG=$(git log -1 --format="%s")

          if ! echo "$MSG" | grep -qE "$PATTERN"; then
            echo "::error::Commit message does not follow Conventional Commits spec"
            echo "::error::Message: $MSG"
            echo "::error::Format: type(scope)!: description"
            echo "::error::Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, merge"
            exit 1
          fi

          echo "Commit follows Conventional Commits spec: $MSG"
