# Lemonade-TQ llama.cpp argument overrides
#
# --sm tensor = tensor parallelism across GPUs
# -ngl 99     = offload all layers to GPU
# -ctk turbo  = TurboQuant 3-bit K cache (5.12x compression, <0.1% PPL cost)
# -ctv turbo  = TurboQuant 3-bit V cache (5.12x compression, <0.1% PPL cost)
LEMONADE_LLAMACPP_ARGS="--sm tensor -ngl 99 -ctk turbo3 -ctv turbo3"
